name: Build MonoSDK - macOS arm64

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build Mono + libs
        run: |
          cd dotnet-runtime
          ./build.sh mono+libs -configuration ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Copy artifacts to SDK
        run: |
          ./BuildMonoSDK.sh $(pwd)/dotnet-runtime macos ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MonoSDK-macOS-arm64
          path: Mac/
          retention-days: 30
          if-no-files-found: error

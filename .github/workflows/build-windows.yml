name: Build MonoSDK - Windows x64

on:
  # Push trigger: auto-build on pushes to ci/auto-build branch
  push:
    branches: [ci/auto-build]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime
        shell: bash

      - name: Build Mono + libs
        run: |
          cd dotnet-runtime
          build.cmd mono+libs -configuration ${{ github.event.inputs.build_type || 'Debug' }}
        shell: cmd

      - name: Copy artifacts to SDK
        run: |
          CopySDKFromSrc.bat %CD%\dotnet-runtime ${{ github.event.inputs.build_type || 'Debug' }}
        shell: cmd

      - name: Set artifact variables
        id: artifact
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-Windows-x64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-Windows-x64-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: Win64/
          retention-days: 30
          if-no-files-found: error

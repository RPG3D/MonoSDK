name: Build MonoSDK - iOS & iOS Simulator

on:
  # Push trigger: auto-build on pushes to ci/auto-build branch
  push:
    branches: [ci/auto-build]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
      platform:
        description: 'Target platform'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - ios
          - iossimulator

permissions:
  contents: write

# Concurrency: only 1 running instance per workflow + branch, cancel outdated runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-26
    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build Mono + libs for iOS
        run: |
          cd dotnet-runtime
          ./build.sh mono+libs -os ios -configuration ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Copy artifacts to SDK (iOS)
        run: |
          chmod +x CopySDKFromSrc.sh
          ./CopySDKFromSrc.sh $(pwd)/dotnet-runtime ios ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Build Mono framework (iOS only)
        run: |
          ./MakeMonoFramework.sh ios $(pwd)/IOS

      - name: Set artifact variables (iOS)
        id: artifact-ios
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-iOS-arm64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-iOS-arm64-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-ios.outputs.name }}
          path: IOS/
          retention-days: 30
          if-no-files-found: error

  build-iossimulator:
    runs-on: macos-26
    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build Mono + libs for iOS Simulator
        run: |
          cd dotnet-runtime
          ./build.sh mono+libs -os iossimulator -configuration ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Copy artifacts to SDK (iOS Simulator)
        run: |
          chmod +x CopySDKFromSrc.sh
          ./CopySDKFromSrc.sh $(pwd)/dotnet-runtime iossimulator ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Build Mono framework (iOS Simulator only)
        run: |
          ./MakeMonoFramework.sh iossimulator $(pwd)/IOSSimulator

      - name: Set artifact variables (iOS Simulator)
        id: artifact-iossim
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-iOSSimulator-arm64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-iOSSimulator-arm64-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload iOS Simulator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-iossim.outputs.name }}
          path: IOSSimulator/
          retention-days: 30
          if-no-files-found: error

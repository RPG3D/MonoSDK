name: Build MonoSDK - Linux x64

on:
  # Push trigger: auto-build on pushes to ci/auto-build branch
  # The [skip ci] in commit messages will prevent infinite loops
  push:
    branches: [ci/auto-build]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libicu-dev libssl-dev libkrb5-dev

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build Mono + libs
        run: |
          cd dotnet-runtime
          ./build.sh mono+libs -configuration ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Create Linux directory
        run: |
          mkdir -p Linux/{include,lib,bin,runtime}

      - name: Copy artifacts to SDK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          SRC_ARTIFACTS="$(pwd)/dotnet-runtime/artifacts"
          MONO_TRIPLE="linux.x64.$BUILD_TYPE"
          RUNTIME_TFM="net10.0-linux-$BUILD_TYPE-x64"
          DEST="$(pwd)/Linux"

          cp -Rf "$SRC_ARTIFACTS/obj/mono/$MONO_TRIPLE/out/include/mono-2.0/" "$DEST/include/"
          cp -Rf "$SRC_ARTIFACTS/obj/mono/$MONO_TRIPLE/out/lib/" "$DEST/lib/"
          cp -Rf "$SRC_ARTIFACTS/obj/mono/$MONO_TRIPLE/out/bin/" "$DEST/bin/"
          cp -Rf "$SRC_ARTIFACTS/bin/runtime/$RUNTIME_TFM/" "$DEST/runtime/"
          cp -Rf "$SRC_ARTIFACTS/bin/mono/$MONO_TRIPLE/IL/" "$DEST/runtime/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MonoSDK-Linux-x64
          path: Linux/
          retention-days: 30
          if-no-files-found: error

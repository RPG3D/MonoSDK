name: Build MonoSDK - Linux x64

on:
  # Push trigger: auto-build on pushes to ci/auto-build branch
  # The [skip ci] in commit messages will prevent infinite loops
  push:
    branches: [ci/auto-build]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

permissions:
  contents: write

# Concurrency: only 1 running instance per workflow + branch, cancel outdated runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libicu-dev libssl-dev libkrb5-dev

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build Mono + libs
        run: |
          cd dotnet-runtime
          ./build.sh mono+libs -configuration ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Copy artifacts to SDK
        run: |
          chmod +x CopySDKFromSrc.sh
          ./CopySDKFromSrc.sh $(pwd)/dotnet-runtime linux ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Set artifact variables
        id: artifact
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-Linux-x64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-Linux-x64-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: Linux/
          retention-days: 30
          if-no-files-found: error

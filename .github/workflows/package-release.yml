name: Package and Release MonoSDK

# This workflow downloads all platform SDKs from GitHub Actions artifacts
# and packages them into a single ZIP file.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'
        type: string
      build_type:
        description: 'Build type to package'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
  push:
    tags:
      - 'v*'  # Push tags like v1.0.0 will trigger this workflow

permissions:
  contents: write
  actions: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Download Linux SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading Linux SDK artifact (${BUILD_TYPE})..."
          if [ "$BUILD_TYPE" == "Release" ]; then
            ARTIFACT_NAME="MonoSDK-Linux-x64-Release"
          else
            ARTIFACT_NAME="MonoSDK-Linux-x64-Debug"
          fi
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-linux.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            mkdir -p Linux
            gh run download $RUN_ID --repo ${{ github.repository }} --name "$ARTIFACT_NAME" --dir Linux/
            echo "✅ Linux SDK downloaded (${BUILD_TYPE})"
          else
            echo "⚠️ Linux SDK artifact not found (${BUILD_TYPE})"
          fi
          ls -la Linux/ 2>/dev/null || echo "❌ Linux/ not downloaded"

      - name: Download macOS SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading macOS SDK artifact (${BUILD_TYPE})..."
          if [ "$BUILD_TYPE" == "Release" ]; then
            ARTIFACT_NAME="MonoSDK-macOS-arm64-Release"
          else
            ARTIFACT_NAME="MonoSDK-macOS-arm64-Debug"
          fi
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-macos.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            mkdir -p Mac
            gh run download $RUN_ID --repo ${{ github.repository }} --name "$ARTIFACT_NAME" --dir Mac/
            echo "✅ macOS SDK downloaded (${BUILD_TYPE})"
          else
            echo "⚠️ macOS SDK artifact not found (${BUILD_TYPE})"
          fi
          ls -la Mac/ 2>/dev/null || echo "❌ Mac/ not downloaded"

      - name: Download Windows SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading Windows SDK artifact (${BUILD_TYPE})..."
          if [ "$BUILD_TYPE" == "Release" ]; then
            ARTIFACT_NAME="MonoSDK-Windows-x64-Release"
          else
            ARTIFACT_NAME="MonoSDK-Windows-x64-Debug"
          fi
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-windows.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            mkdir -p Win64
            gh run download $RUN_ID --repo ${{ github.repository }} --name "$ARTIFACT_NAME" --dir Win64/
            echo "✅ Windows SDK downloaded (${BUILD_TYPE})"
          else
            echo "⚠️ Windows SDK artifact not found (${BUILD_TYPE})"
          fi
          ls -la Win64/ 2>/dev/null || echo "❌ Win64/ not downloaded"

      - name: Download Android SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading Android SDK artifact (${BUILD_TYPE})..."
          if [ "$BUILD_TYPE" == "Release" ]; then
            ARTIFACT_NAME="MonoSDK-Android-arm64-Release"
          else
            ARTIFACT_NAME="MonoSDK-Android-arm64-Debug"
          fi
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-android.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            mkdir -p Android
            gh run download $RUN_ID --repo ${{ github.repository }} --name "$ARTIFACT_NAME" --dir Android/
            echo "✅ Android SDK downloaded (${BUILD_TYPE})"
          else
            echo "⚠️ Android SDK artifact not found (${BUILD_TYPE})"
          fi
          ls -la Android/ 2>/dev/null || echo "❌ Android/ not downloaded"

      - name: Download iOS SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading iOS SDK artifact (${BUILD_TYPE})..."
          if [ "$BUILD_TYPE" == "Release" ]; then
            ARTIFACT_NAME="MonoSDK-iOS-arm64-Release"
          else
            ARTIFACT_NAME="MonoSDK-iOS-arm64-Debug"
          fi
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-ios.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            mkdir -p IOS
            gh run download $RUN_ID --repo ${{ github.repository }} --name "$ARTIFACT_NAME" --dir IOS/
            echo "✅ iOS SDK downloaded (${BUILD_TYPE})"
          else
            echo "⚠️ iOS SDK artifact not found (${BUILD_TYPE})"
          fi
          ls -la IOS/ 2>/dev/null || echo "❌ IOS/ not downloaded"

      - name: Download iOS Simulator SDK artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'Debug' }}"
          echo ">>> Downloading iOS Simulator SDK artifact (${BUILD_TYPE})..."
          if [ "$BUILD_TYPE" == "Release" ]; then
            ARTIFACT_NAME="MonoSDK-iOSSimulator-arm64-Release"
          else
            ARTIFACT_NAME="MonoSDK-iOSSimulator-arm64-Debug"
          fi
          RUN_ID=$(gh run list --repo ${{ github.repository }} --workflow=build-ios.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ]; then
            mkdir -p IOSSimulator
            gh run download $RUN_ID --repo ${{ github.repository }} --name "$ARTIFACT_NAME" --dir IOSSimulator/
            echo "✅ iOS Simulator SDK downloaded (${BUILD_TYPE})"
          else
            echo "⚠️ iOS Simulator SDK artifact not found (${BUILD_TYPE})"
          fi
          ls -la IOSSimulator/ 2>/dev/null || echo "❌ IOSSimulator/ not downloaded"

      - name: Verify downloaded SDKs
        run: |
          echo ">>> Verifying downloaded SDKs..."
          echo "=== Linux ==="
          ls -la Linux/ 2>/dev/null || echo "❌ Linux not available"
          echo "=== macOS ==="
          ls -la Mac/ 2>/dev/null || echo "❌ macOS not available"
          echo "=== Windows ==="
          ls -la Win64/ 2>/dev/null || echo "❌ Windows not available"
          echo "=== Android ==="
          ls -la Android/ 2>/dev/null || echo "❌ Android not available"
          echo "=== iOS ==="
          ls -la IOS/ 2>/dev/null || echo "❌ iOS not available"
          echo "=== iOS Simulator ==="
          ls -la IOSSimulator/ 2>/dev/null || echo "❌ iOS Simulator not available"

      - name: Create package directory
        run: |
          PACKAGE_NAME="MonoSDK"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          mkdir -p package/${PACKAGE_NAME}

      - name: Copy SDKs to package
        run: |
          PACKAGE_NAME="${{ env.PACKAGE_NAME }}"
          mkdir -p package/${PACKAGE_NAME}

          # Copy platform directories
          cp -Rf Win64/ package/${PACKAGE_NAME}/ 2>/dev/null || echo "⚠️ Win64 not available"
          cp -Rf Mac/ package/${PACKAGE_NAME}/ 2>/dev/null || echo "⚠️ Mac not available"
          cp -Rf Android/ package/${PACKAGE_NAME}/ 2>/dev/null || echo "⚠️ Android not available"
          cp -Rf IOS/ package/${PACKAGE_NAME}/ 2>/dev/null || echo "⚠️ IOS not available"
          cp -Rf IOSSimulator/ package/${PACKAGE_NAME}/ 2>/dev/null || echo "⚠️ IOSSimulator not available"
          cp -Rf Linux/ package/${PACKAGE_NAME}/ 2>/dev/null || echo "⚠️ Linux not available"

          # Copy build scripts
          cp BuildMonoSDK.sh package/${PACKAGE_NAME}/ 2>/dev/null || true
          cp BuildMonoSDK.bat package/${PACKAGE_NAME}/ 2>/dev/null || true
          cp MakeMonoFramework.sh package/${PACKAGE_NAME}/ 2>/dev/null || true
          cp CopySDKFromSrc.sh package/${PACKAGE_NAME}/ 2>/dev/null || true
          cp CopySDKFromSrc.bat package/${PACKAGE_NAME}/ 2>/dev/null || true

          # Copy Unreal Build System files
          cp MonoSDK.Build.cs package/${PACKAGE_NAME}/ 2>/dev/null || true
          cp MonoSDK_APL.xml package/${PACKAGE_NAME}/ 2>/dev/null || true

          # Copy documentation
          cp README.md package/${PACKAGE_NAME}/ 2>/dev/null || true
          cp .gitignore package/${PACKAGE_NAME}/ 2>/dev/null || true

          # Copy include/ from any platform (e.g., Linux)
          if [ -d "Linux/include" ]; then
            cp -Rf Linux/include package/${PACKAGE_NAME}/include 2>/dev/null || true
          elif [ -d "Mac/include" ]; then
            cp -Rf Mac/include package/${PACKAGE_NAME}/include 2>/dev/null || true
          fi

          echo "✅ Package created at package/${PACKAGE_NAME}/"
          ls -la package/${PACKAGE_NAME}/

      - name: Create ZIP archive
        run: |
          cd package
          # ZIP file name includes version and build_type
          ZIP_NAME="MonoSDK-${{ github.event.inputs.version || 'v0.1.0' }}-${{ github.event.inputs.build_type || 'Debug' }}.zip"
          zip -r ${ZIP_NAME} MonoSDK/
          echo "✅ ZIP created: package/${ZIP_NAME}"
          ls -lh ${ZIP_NAME}
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MonoSDK-${{ github.event.inputs.version || 'v0.1.0' }}-${{ github.event.inputs.build_type || 'Debug' }}
          path: package/${{ env.ZIP_NAME }}
          retention-days: 90  # Longer retention for releases

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != '' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: MonoSDK ${{ github.event.inputs.version || github.ref_name }}
          body: |
            MonoSDK release ${{ github.event.inputs.version || github.ref_name }}

            ## Build Type
            ${{ github.event.inputs.build_type || 'Debug' }}

            ## Platforms
            - ✅ Win64 (Windows x64)
            - ✅ Mac (macOS arm64)
            - ✅ Android (arm64)
            - ✅ iOS (arm64)
            - ✅ iOS Simulator (arm64)
            - ✅ Linux (x64)

            ## Installation
            1. Download the ZIP file
            2. Extract to your UnrealSharp plugin's `Source/ThirdParty/` directory
            3. Rename the extracted directory to `MonoSDK/` (if not already)
            4. Or use the build scripts to rebuild from source

            ## Build Info
            Built from: https://github.com/dotnet/runtime.git (branch: release/10.0)
            Build date: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            package/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

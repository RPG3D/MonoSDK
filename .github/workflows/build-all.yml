name: Build MonoSDK - All Platforms

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
      build_linux:
        description: 'Build Linux'
        required: false
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS'
        required: false
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows'
        required: false
        type: boolean
        default: true
      build_android:
        description: 'Build Android'
        required: false
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS'
        required: false
        type: boolean
        default: true
      build_iossimulator:
        description: 'Build iOS Simulator'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    if: github.event.inputs.build_linux == 'true'
    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libicu-dev libssl-dev libkrb5-dev

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build MonoSDK (Linux)
        run: |
          chmod +x BuildMonoSDK.sh
          ./BuildMonoSDK.sh $(pwd)/dotnet-runtime linux ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Set artifact variables
        id: artifact
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-Linux-x64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-Linux-x64-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: Linux/
          retention-days: 30
          if-no-files-found: error

  build-windows:
    runs-on: windows-2022
    if: github.event.inputs.build_windows == 'true'
    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime
        shell: bash

      - name: Build MonoSDK (Windows)
        run: |
          BuildMonoSDK.bat %CD%\dotnet-runtime ${{ github.event.inputs.build_type || 'Debug' }}
        shell: cmd

      - name: Set artifact variables
        id: artifact
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-Windows-x64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-Windows-x64-Debug" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: Win64/
          retention-days: 30
          if-no-files-found: error

  build-macos:
    runs-on: macos-26
    if: github.event.inputs.build_macos == 'true'
    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build MonoSDK (macOS)
        run: |
          chmod +x BuildMonoSDK.sh
          ./BuildMonoSDK.sh $(pwd)/dotnet-runtime macos ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Set artifact variables
        id: artifact
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-macOS-arm64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-macOS-arm64-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: Mac/
          retention-days: 30
          if-no-files-found: error

  build-ios:
    runs-on: macos-26
    if: github.event.inputs.build_ios == 'true'
    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build MonoSDK (iOS)
        run: |
          chmod +x BuildMonoSDK.sh
          ./BuildMonoSDK.sh $(pwd)/dotnet-runtime ios ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Set artifact variables
        id: artifact
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-iOS-arm64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-iOS-arm64-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: IOS/
          retention-days: 30
          if-no-files-found: error

  build-iossimulator:
    runs-on: macos-26
    if: github.event.inputs.build_iossimulator == 'true'
    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build MonoSDK (iOS Simulator)
        run: |
          chmod +x BuildMonoSDK.sh
          ./BuildMonoSDK.sh $(pwd)/dotnet-runtime iossimulator ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Set artifact variables
        id: artifact
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-iOS-Simulator-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-iOS-Simulator-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload iOS Simulator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: IOSSimulator/
          retention-days: 30
          if-no-files-found: error

  build-android:
    runs-on: macos-26
    if: github.event.inputs.build_android == 'true'
    steps:
      - name: Checkout MonoSDK
        uses: actions/checkout@v4
        with:
          ref: ci/auto-build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone dotnet/runtime
        run: |
          git clone --depth 1 --branch release/10.0 https://github.com/dotnet/runtime.git dotnet-runtime

      - name: Build MonoSDK (Android)
        run: |
          chmod +x BuildMonoSDK.sh
          ./BuildMonoSDK.sh $(pwd)/dotnet-runtime android ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Set artifact variables
        id: artifact
        run: |
          if [ "${{ github.event.inputs.build_type || 'Debug' }}" == "Release" ]; then
            echo "name=MonoSDK-Android-arm64-Release" >> $GITHUB_OUTPUT
          else
            echo "name=MonoSDK-Android-arm64-Debug" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: Android/
          retention-days: 30
          if-no-files-found: error
